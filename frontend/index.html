<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base-url" content="http://localhost:8080" />
    <title>Inbank · Loan Decision Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="logo"><span class="logo-bracket"></span><em>Inbank</em><span class="logo-bracket"></span></div>
            <p class="header-sub">Loan Decision Engine</p>
        </header>

        <main class="main">
            <div class="card">
                <div class="card-label">Application</div>

                <div class="field">
                    <label for="personalCode">Personal Code</label>
                    <div class="input-row">
                        <input type="text" id="personalCode" placeholder="e.g. 49002010976" maxlength="20" autocomplete="off" />
                        <div class="quick-codes">
                            <span class="quick-label">Quick fill:</span>
                            <button class="chip" data-code="49002010965" title="Has debt">Debt</button>
                            <button class="chip" data-code="49002010976" title="Segment 1">S1</button>
                            <button class="chip" data-code="49002010987" title="Segment 2">S2</button>
                            <button class="chip" data-code="49002010998" title="Segment 3">S3</button>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label for="loanAmount">Loan Amount <span class="field-value" id="amountDisplay">€ 4,000</span></label>
                    <input type="range" id="loanAmount" min="2000" max="10000" step="100" value="4000" />
                    <div class="range-labels"><span>€ 2,000</span><span>€ 10,000</span></div>
                </div>

                <div class="field">
                    <label for="loanPeriod">Loan Period <span class="field-value" id="periodDisplay">24 months</span></label>
                    <input type="range" id="loanPeriod" min="12" max="60" step="1" value="24" />
                    <div class="range-labels"><span>12 months</span><span>60 months</span></div>
                </div>

                <button class="submit-btn" id="submitBtn">
                    <span class="btn-text">Calculate Decision</span>
                    <span class="btn-spinner" hidden>···</span>
                </button>
            </div>

            <div class="result-area" id="resultArea" hidden>
                <div class="result-card">
                    <div class="result-badge" id="resultBadge"></div>
                    <div class="result-body">
                        <div class="result-row" id="resultAmountRow">
                            <span class="result-label">Approved Amount</span>
                            <span class="result-val" id="resultAmount"></span>
                        </div>
                        <div class="result-row" id="resultPeriodRow">
                            <span class="result-label">Approved Period</span>
                            <span class="result-val" id="resultPeriod"></span>
                        </div>
                        <p class="result-message" id="resultMessage"></p>
                    </div>
                </div>
            </div>

            <div class="error-area" id="errorArea" hidden>
                <div class="error-card">
                    <span class="error-icon">⚠</span>
                    <p id="errorMessage"></p>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>Decision engine · <code>POST /api/decision</code></p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
